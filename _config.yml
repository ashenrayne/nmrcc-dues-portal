title: Carpenter Council Payments Portal
description: Proposal, scope, and technology stack for the NMRCC dues platform. Prepared by Ashen Rayne.
theme: jekyll-theme-cayman

# Use GitHub-Flavored Markdown with hard line breaks so a single newline
# in source becomes a <br> in HTML. Matches how GitHub renders comments
# and avoids consecutive lines collapsing into one paragraph.
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: true

# jekyll-relative-links rewrites in-document links like
# [scope-document.md](scope-document.md) so they work once Jekyll renders
# the .md files as .html on GitHub Pages.
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

include:
  - "*.md"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
